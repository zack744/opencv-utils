<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCV Web UI</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="video-pane" aria-label="视频画面">
        <header class="topbar">
          <div>
            <p class="eyebrow">OpenCV Web UI</p>
            <h1 id="appTitle">检测系统</h1>
          </div>
          <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="检测模式"></div>
        </header>

        <div class="stream-frame" id="streamFrame">
          <img id="stream" src="/stream" alt="实时检测视频流" />
          <div class="rec-badge" id="recBadge">REC</div>
        </div>

        <footer class="telemetry">
          <span id="cameraStatus" class="status-pill">摄像头: --</span>
          <span id="fps">FPS: 0</span>
          <span id="source">源: --</span>
        </footer>
      </section>

      <aside class="side-panel" aria-label="状态和控制">
        <section class="status-block" id="statusBlock">
          <div class="state-line">
            <span id="stateDot" class="state-dot"></span>
            <div>
              <p id="stateText" class="state-text">初始化</p>
              <p id="stateSub" class="state-sub"></p>
            </div>
          </div>
          <p id="mainText" class="main-text">正在启动...</p>
          <div class="progress-track" aria-label="进度">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </section>

        <section class="control-block">
          <div class="switch-row">
            <span>识别</span>
            <label class="toggle">
              <input id="recognitionToggle" type="checkbox" checked />
              <span></span>
            </label>
          </div>

          <div class="camera-row">
            <label for="cameraInput">摄像头源</label>
            <div class="input-row">
              <input id="cameraInput" placeholder="0 或 http://IP:8080/video" />
              <button id="applyCameraBtn" type="button">应用</button>
            </div>
          </div>

          <div class="button-row">
            <button id="switchCameraBtn" type="button">切换 0/1</button>
            <button id="browserCameraBtn" type="button">使用网页摄像头</button>
            <button id="stopBrowserCameraBtn" type="button" class="ghost" hidden>停止网页摄像头</button>
            <button id="recordBtn" type="button" class="danger">开始录制</button>
          </div>
        </section>

        <section class="stats-block">
          <div class="section-head">
            <h2>实时统计</h2>
            <span id="recordingTime"></span>
          </div>
          <dl id="statsList" class="stats-list"></dl>
        </section>

        <section class="recordings-block" id="recordingsBlock" aria-label="录像回放">
          <div class="section-head">
            <h2>录像回放</h2>
            <button id="refreshRecordingsBtn" type="button" class="ghost">刷新</button>
          </div>
          <div class="recording-player">
            <video
              id="recordingPlayer"
              controls
              preload="metadata"
              playsinline
            ></video>
            <p id="recordingPlayerHint" class="recording-hint">
              从下方列表选择一段录像进行回放
            </p>
          </div>
          <ul id="recordingList" class="recording-list"></ul>
        </section>
      </aside>
 </main>

 <details id="adminDrawer" class="admin-drawer" aria-label="管理员调试设置">
 <summary>调试设置</summary>
 <div class="admin-drawer-body">
 <div class="camera-row pushup-only" id="pushupTargetBlock" hidden>
 <label for="pushupTargetInput">俯卧撑目标次数（1-100）</label>
 <div class="input-row">
 <input
 id="pushupTargetInput"
 type="number"
 min="1"
 max="100"
 step="1"
 inputmode="numeric"
 placeholder="3"
 />
 <button id="applyPushupTargetBtn" type="button">应用</button>
 </div>
 <p class="hint">达到此次数即触发开锁；调节后立即生效。</p>
 </div>
 <p class="admin-hint">本区域仅供管理员使用，观众视图不会显示。修改俯卧撑次数前请确认已完成目标次数设定。</p>
 </div>
 </details>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
