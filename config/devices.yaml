# 外设触发配置
# ---------------------------------
# 顶层 key = 业务模式名 (closed_eye / bite_finger / pushup)
# 二级 key = 动作名 (业务代码里 emit_action("xxx") 那个字符串)
#
# 每条路由必须有:
#   device: 设备类型 (dummy / relay / buzzer / servo_lock / arduino)
#   其它字段会一并传给设备 __init__ 和 trigger payload
#
# 不存在的模式/动作 = 业务调用 emit_action 时静默忽略
# 不想接硬件时把 device 改成 dummy,只打日志不动 GPIO
#
# 当前架构:  Pi USB → Arduino Nano → 继电器 IN → 外设
#   路由里把 device 改成 arduino,payload 走 USB 串口到 Nano,
#   Nano 收到 "PIN N HIGH MS" 后拉脚,继电器由 Nano 端独立电源驱动。
#   同 port 多个 pin 自动复用串口实例。

# ============ 闭眼监控 → 电击 (走 Nano D3 继电器 A) ============
closed_eye:
  shock:
    device: arduino
    name: massager_power
    port: /dev/ttyUSB0       # Pi 上;Windows 测试改 COM3
    baud: 9600
    pin: 3                   # Nano D3 → 继电器A IN → 按摩仪 5V 供电
    pulse: 8.0               # 旧脉冲模式兜底;闭眼监控现在用 state=on/off 持续控制
    active_high: true        # 你的继电器板上电 HIGH 会吸合,所以闭眼时发 HIGH
    cooldown: 0.0            # 状态切换不能被冷却拦住,睁眼要立刻断开

# ============ 咬手指 → 提醒 (还没接硬件,留 dummy) ============
bite_finger:
  alert:
    device: dummy           # 选定后可改 buzzer / arduino
    name: bite_alert
    pin: 18
    beeps: 2
    on_ms: 120
    off_ms: 80
    cooldown: 3.0

# ============ 俯卧撑 → 开锁 (走 eWeLink 智能继电器, 云端 HTTP) ============
# 板子: SDY-002_V1.2 / 固件 CK-BL602-4SW-HS-03 (4 路板子, 实际只用 outlet 0)
# 数据流: 俯卧撑达标 → 树莓派发 HTTP → eWeLink 云 → 家里 WiFi → 板子 MCU → 继电器吸合
#         继电器 NO/COM 接到 12V 电磁锁回路 (物理接线见项目文档)
pushup:
  unlock:
    device: ewelink_relay    # 云端 HTTP
    name: door_lock
    # ---- eWeLink 账号 / 设备 ----
    phone: "182xxxxxxxx"     # 纯手机号, 代码自动加 +86 前缀
    password: "REDACTED_PASSWORD"     # 测试用, 改锁配置前请去 eWeLink App 改密码
    device_id: "1002b42d5b"  # 易微联 App → 设备 → 设备信息 里查
    region: cn               # cn / us / eu / as, 中国用户用 cn
    outlet: 0                # 4 路板子: 0~3, 这里用第 0 路接锁
    # ---- 时序 ----
    pulse: 10.0               # 断电 5s 开锁, 锁本身是 fail-safe (通电锁死)
    #   触发 → 板子 OFF (NC 断开) → 锁断电 → 锁芯收回 → 门开
    #   5s 后 → 板子 ON (NC 闭合) → 锁通电 → 锁芯弹出 → 门上锁
    cooldown: 30.0           # 两次开锁至少间隔 30s
